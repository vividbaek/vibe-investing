<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAON VaultGuard — Dashboard</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --muted: #8b949e;
  --critical: #f85149;
  --high: #d29922;
  --medium: #58a6ff;
  --info: #3fb950;
  --green: #3fb950;
  --red: #f85149;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding: 20px;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 20px;
}
header h1 { font-size: 20px; color: var(--green); }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-dot.online { background: var(--green); }
.status-dot.offline { background: var(--red); }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.card h3 { font-size: 13px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.card .value { font-size: 28px; font-weight: bold; }
.value.critical { color: var(--critical); }
.value.high { color: var(--high); }
.value.total { color: var(--text); }
.findings-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.findings-table th {
  text-align: left;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--muted);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.findings-table td {
  padding: 10px 16px;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
}
.findings-table tr:hover { background: rgba(255,255,255,0.03); }
.findings-table tr.selected { background: rgba(63,185,80,0.08); }
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: bold;
  text-transform: uppercase;
}
.badge.critical { background: rgba(248,81,73,0.2); color: var(--critical); }
.badge.high { background: rgba(210,153,34,0.2); color: var(--high); }
.badge.medium { background: rgba(88,166,255,0.2); color: var(--medium); }
.badge.info { background: rgba(63,185,80,0.2); color: var(--info); }
.btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
}
.btn:hover { background: var(--border); }
.btn.primary { background: var(--green); color: #000; border-color: var(--green); }
.btn.danger { background: var(--critical); color: #fff; border-color: var(--critical); }
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-bar .btn.active { background: var(--green); color: #000; border-color: var(--green); }
.filter-bar select, .filter-bar input {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
}
.filter-bar input { width: 140px; }
.bulk-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  align-items: center;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.bulk-bar.hidden { display: none; }
.empty-state { text-align: center; padding: 40px; color: var(--muted); }
.scan-info { font-size: 13px; color: var(--muted); margin-top: 8px; }
.check-col { width: 30px; text-align: center; }
.check-col input { cursor: pointer; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🛡 LAON VaultGuard</h1>
    <div style="font-size:13px;color:var(--muted);margin-top:4px">
      <span class="status-dot online" id="status-dot"></span>
      <span id="connection-status">연결됨</span>
      · macOS v0.1.1
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn primary" id="scan-btn" onclick="triggerScan()">🔄 지금 스캔</button>
  </div>
</header>

<div class="grid">
  <div class="card">
    <h3>미해결 Findings</h3>
    <div class="value critical" id="open-count">-</div>
  </div>
  <div class="card">
    <h3>총 스캔 횟수</h3>
    <div class="value total" id="scan-count">-</div>
  </div>
  <div class="card">
    <h3>등록 레포</h3>
    <div class="value total" id="repo-count">-</div>
  </div>
  <div class="card">
    <h3>마지막 스캔</h3>
    <div class="value" style="font-size:16px" id="last-scan">-</div>
  </div>
</div>

<div class="filter-bar">
  <button class="btn active" onclick="setFilter('all')">전체</button>
  <button class="btn" onclick="setFilter('critical')">Critical</button>
  <button class="btn" onclick="setFilter('high')">High</button>
  <button class="btn" onclick="setFilter('medium')">Medium</button>
  <button class="btn" onclick="setFilter('info')">Info</button>
  <span style="margin-left:12px;font-size:13px;color:var(--muted)">레포:</span>
  <select id="repo-filter" onchange="setRepoFilter(this.value)">
    <option value="">전체</option>
  </select>
  <span style="font-size:13px;color:var(--muted)">기간:</span>
  <input type="date" id="date-from" onchange="loadFindings()" title="시작일">
  <span style="font-size:13px;color:var(--muted)">~</span>
  <input type="date" id="date-to" onchange="loadFindings()" title="종료일">
  <span style="flex:1"></span>
  <button class="btn" onclick="loadFindings()">🔄 새로고침</button>
</div>

<div class="bulk-bar hidden" id="bulk-bar">
  <span id="bulk-count" style="font-size:13px;color:var(--muted)">0개 선택</span>
  <button class="btn primary" onclick="bulkAcknowledge()">✅ 선택 항목 확인</button>
  <button class="btn" onclick="clearSelection()">취소</button>
</div>

<table class="findings-table" id="findings-table">
  <thead>
    <tr>
      <th class="check-col"><input type="checkbox" id="select-all" onchange="toggleSelectAll()" title="전체 선택"></th>
      <th>심각도</th>
      <th>레포</th>
      <th>Provider</th>
      <th>유형</th>
      <th>파일</th>
      <th>Fingerprint</th>
      <th>탐지 시각</th>
      <th>처리</th>
    </tr>
  </thead>
  <tbody id="findings-body">
    <tr><td colspan="9" class="empty-state">로딩 중...</td></tr>
  </tbody>
</table>

<div class="scan-info" id="scan-info"></div>

<script src="dashboard.js"></script>
</body>
</html>
