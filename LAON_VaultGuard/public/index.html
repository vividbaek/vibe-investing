<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAON VaultGuard — Dashboard</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --muted: #8b949e;
  --critical: #f85149;
  --high: #d29922;
  --medium: #58a6ff;
  --info: #3fb950;
  --green: #3fb950;
  --red: #f85149;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding: 20px;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 20px;
}
header h1 { font-size: 20px; color: var(--green); }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-dot.online { background: var(--green); }
.status-dot.offline { background: var(--red); }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.card h3 { font-size: 13px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.card .value { font-size: 28px; font-weight: bold; }
.value.critical { color: var(--critical); }
.value.high { color: var(--high); }
.value.total { color: var(--text); }
.findings-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.findings-table th {
  text-align: left;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--muted);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.findings-table td {
  padding: 10px 16px;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
}
.findings-table tr:hover { background: rgba(255,255,255,0.03); }
.findings-table tr.selected { background: rgba(63,185,80,0.08); }
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: bold;
  text-transform: uppercase;
}
.badge.critical { background: rgba(248,81,73,0.2); color: var(--critical); }
.badge.high { background: rgba(210,153,34,0.2); color: var(--high); }
.badge.medium { background: rgba(88,166,255,0.2); color: var(--medium); }
.badge.info { background: rgba(63,185,80,0.2); color: var(--info); }
.btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
}
.btn:hover { background: var(--border); }
.btn.primary { background: var(--green); color: #000; border-color: var(--green); }
.btn.danger { background: var(--critical); color: #fff; border-color: var(--critical); }
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-bar .btn.active { background: var(--green); color: #000; border-color: var(--green); }
.filter-bar select, .filter-bar input {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
}
.filter-bar input { width: 140px; }
.bulk-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  align-items: center;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.bulk-bar.hidden { display: none; }
.empty-state { text-align: center; padding: 40px; color: var(--muted); }
.scan-info { font-size: 13px; color: var(--muted); margin-top: 8px; }
.check-col { width: 30px; text-align: center; }
.check-col input { cursor: pointer; }
</style>
<script src="lang.js"></script>
</head>
<body>
<script>document.querySelector('select[onchange="setLang(this.value)"]').value=localStorage.getItem("laon-lang")||"ko";</script>

<header>
  <div>
    <h1 data-t="title">LAON VaultGuard</h1>
    <div style="font-size:13px;color:var(--muted);margin-top:4px">
      <span class="status-dot online" id="status-dot"></span>
      <span id="connection-status">연결됨</span>
      · v0.2.0 · macOS / Linux / Win(WSL)
    </div>
  </div>
  <select onchange="setLang(this.value)" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);font-size:12px;font-family:inherit"><option value="ko">KO</option><option value="en">EN</option><option value="zh">ZH</option><option value="ja">JA</option></select>
  <div style="display:flex;gap:8px">
    <span id="github-status" style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px"></span>
    <button class="btn" id="github-btn" onclick="toggleGithub()" style="display:none">🔗 GitHub</button>
    <button class="btn" onclick="toggleAlerts()">🔔 알람 설정</button>
    <select id="repo-scan-select" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;max-width:160px" onchange=""><option value="">All repos</option></select>
    <button class="btn primary" id="scan-btn" onclick="triggerRepoScan()" data-t="scanNow">Scan Now</button>
    <select id="scan-mode" style="padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:12px;font-family:inherit"><option value="full">Full</option><option value="diff">Diff</option></select>
    <button class="btn" onclick="exportReport()">Report</button>
    <button class="btn" onclick="setupAlerts()">Setup Alerts</button>
    <button class="btn" onclick="toggleHistory()">Scan Logs</button>
    <button class="btn primary" id="scan-btn" onclick="triggerScan()">🔄 지금 스캔</button>
  </div>
</header>

<div id="alert-panel" style="display:none;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:20px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h3 style="font-size:14px">🔔 알람 채널 설정</h3>
    <button class="btn" onclick="document.getElementById('alert-panel').style.display='none'">닫기</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px">
    <label style="display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg);border-radius:6px;cursor:pointer">
      <input type="checkbox" id="ch-slack" onchange="saveAlertConfig()"> <span>Slack</span>
    </label>
    <label style="display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg);border-radius:6px;cursor:pointer">
      <input type="checkbox" id="ch-telegram" onchange="saveAlertConfig()"> <span>Telegram</span>
    </label>
    <label style="display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg);border-radius:6px;cursor:pointer">
      <input type="checkbox" id="ch-email" onchange="saveAlertConfig()"> <span>Email</span>
      <select id="report-freq" onchange="saveAlertConfig()" style="margin-left:auto;padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);font-size:12px">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="off">Off</option>
      </select>
    </label>
    <label style="display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg);border-radius:6px;cursor:pointer">
      <input type="checkbox" id="ch-teams" onchange="saveAlertConfig()"> <span>Teams</span>
    </label>
    <label style="display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg);border-radius:6px;cursor:pointer">
      <input type="checkbox" id="ch-discord" onchange="saveAlertConfig()"> <span>Discord</span>
    </label>
  </div>
</div>

<div id="github-panel" style="display:none;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:20px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h3 style="font-size:14px">🔗 GitHub Repositories</h3>
    <select onchange="setLang(this.value)" style="padding:4px 6px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);font-size:14px;font-family:inherit"><option value="ko">🇰🇷</option><option value="en">🇺🇸</option><option value="zh">🇨🇳</option><option value="ja">🇯🇵</option></select>
  <div style="display:flex;gap:8px">
      <button class="btn" id="github-connect-btn" onclick="connectGithub()">GitHub 연동</button>
      <button class="btn danger" id="github-disconnect-btn" onclick="disconnectGithub()" style="display:none">연동 해제</button>
      <button class="btn" onclick="document.getElementById('github-panel').style.display='none'">닫기</button>
    </div>
  </div>
  <div id="github-repo-list" style="max-height:300px;overflow-y:auto;font-size:13px"></div>
</div>

<div class="grid">
  <div class="card">
    <h3>미해결 Findings</h3>
    <div class="value critical" id="open-count">-</div>
  </div>
  <div class="card">
    <h3>총 스캔 횟수</h3>
    <div class="value total" id="scan-count">-</div>
  </div>
  <div class="card">
    <h3>등록 레포</h3>
    <div class="value total" id="repo-count">-</div>
  </div>
  <div class="card">
    <h3>마지막 스캔</h3>
    <div class="value" style="font-size:16px" id="last-scan">-</div>
  </div>
</div>


<div id="history-panel" style="display:none;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:20px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h3 style="font-size:14px">Scan History Logs</h3>
    <button class="btn" onclick="document.getElementById('history-panel').style.display='none'">Close</button>
  </div>
  <div id="scan-history-list" style="max-height:400px;overflow-y:auto;font-size:13px">Loading...</div>
</div>

<div class="filter-bar">
  <button class="btn active" onclick="setFilter('all')">전체</button>
  <button class="btn" onclick="setFilter('critical')">Critical</button>
  <button class="btn" onclick="setFilter('high')">High</button>
  <button class="btn" onclick="setFilter('medium')">Medium</button>
  <button class="btn" onclick="setFilter('info')">Info</button>
  <span style="margin-left:12px;font-size:13px;color:var(--muted)">레포:</span>
  <select id="repo-filter" onchange="setRepoFilter(this.value)">
    <option value="">전체</option>
  </select>
  <span style="font-size:13px;color:var(--muted)">기간:</span>
  <input type="date" id="date-from" onchange="loadFindings()" title="시작일">
  <span style="font-size:13px;color:var(--muted)">~</span>
  <input type="date" id="date-to" onchange="loadFindings()" title="종료일">
  <span style="flex:1"></span>
  <button class="btn" onclick="loadFindings()">🔄 새로고침</button>
</div>

<div class="bulk-bar hidden" id="bulk-bar">
  <span id="bulk-count" style="font-size:13px;color:var(--muted)">0개 선택</span>
  <button class="btn primary" onclick="bulkAcknowledge()">✅ 선택 항목 확인</button>
  <button class="btn" onclick="clearSelection()">취소</button>
</div>

<table class="findings-table" id="findings-table">
  <thead>
    <tr>
      <th class="check-col"><input type="checkbox" id="select-all" onchange="toggleSelectAll()" title="전체 선택"></th>
      <th>심각도</th>
      <th>레포</th>
      <th>Provider</th>
      <th>유형</th>
      <th>파일</th>
      <th>Fingerprint</th>
      <th>탐지 시각</th>
      <th>처리</th>
    </tr>
  </thead>
  <tbody id="findings-body">
    <tr><td colspan="9" class="empty-state">로딩 중...</td></tr>
  </tbody>
</table>

<div class="scan-info" id="scan-info"></div>

<script src="dashboard.js"></script>

<div id="finding-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-size:16px" id="modal-title">Finding Detail</h3>
      <button class="btn" onclick="closeModal()">Close</button>
    </div>
    <div id="modal-body" style="font-size:13px;line-height:1.8"></div>
  </div>
</div>

</body>
</html>
